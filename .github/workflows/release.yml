name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to pack (must match src/DCS.Cli/DCS.Cli.csproj), e.g. 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Verify tag matches csproj Version
        run: |
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/DCS.Cli/DCS.Cli.csproj | head -1)
          if [ "${{ steps.version.outputs.version }}" != "${CSPROJ_VERSION}" ]; then
            echo "::error::Tag/input version (${{ steps.version.outputs.version }}) != csproj Version (${CSPROJ_VERSION}). Bump src/DCS.Cli/DCS.Cli.csproj before tagging."
            exit 1
          fi

  test:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test --no-build -c Release --verbosity normal
          --filter "Category!=CorpusGate"
        env:
          CI: true

  pack:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack global tool
        run: >
          dotnet pack src/DCS.Cli/DCS.Cli.csproj
          -c Release
          -o artifacts/nupkg
          -p:Version=${{ needs.validate.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/nupkg/*.nupkg
          retention-days: 30

  github-release:
    needs: [validate, pack]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          : > release-notes.md
          if [ -f CHANGELOG.md ]; then
            awk "/^## \\[${VERSION}\\]/ {found=1; next} found && /^## \\[/ {exit} found {print}" CHANGELOG.md >> release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)." > release-notes.md
          fi
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "dotnet tool install --global DependencyChainSubstrate.Cli --version ${VERSION}" >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.validate.outputs.version) || github.ref_name }}
          name: DependencyChainSubstrate.Cli v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          files: artifacts/nupkg/*.nupkg
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nuget:
    needs: [validate, pack]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Skip when NuGet API key is not configured
        if: env.NUGET_API_KEY == ''
        run: |
          echo "NUGET_API_KEY secret not set; skipping NuGet.org publish."
          echo "GitHub Release still publishes the .nupkg for manual or add-source install."

      - name: Download package
        if: env.NUGET_API_KEY != ''
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: Setup .NET
        if: env.NUGET_API_KEY != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish to NuGet.org
        if: env.NUGET_API_KEY != ''
        run: >
          dotnet nuget push artifacts/nupkg/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key "$NUGET_API_KEY"
          --skip-duplicate
