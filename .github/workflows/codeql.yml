name: CodeQL

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "planning/**"
      - "vscode-extension/**"
      - "scripts/**"
      - "ci/**"
      - ".github/**"
      - "!.github/workflows/codeql.yml"
      - "!.github/codeql/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "planning/**"
      - "vscode-extension/**"
      - "scripts/**"
      - "ci/**"
  merge_group:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "planning/**"
      - "vscode-extension/**"
  schedule:
    # Weekly deep scan — Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      query_suite:
        description: CodeQL query suite
        type: choice
        default: security-extended
        options:
          - security-extended
          - security-and-quality
      build_configuration:
        description: MSBuild configuration
        type: choice
        default: Release
        options:
          - Release
          - Debug

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  CI: true

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'DCS.slnx'
              - 'nuget.config'
              - '**/*.csproj'
              - '.github/workflows/codeql.yml'
              - '.github/codeql/codeql-config.yml'
              - '.github/codeql/**'

  analyze:
    needs: changes
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')
    name: Analyze (${{ matrix.language }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            os: ubuntu-latest
            dotnet-version: "8.0.x"
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history improves cross-commit analysis on default branch
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - name: Resolve query suite
        id: suite
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUITE="${{ github.event.inputs.query_suite }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            SUITE="security-and-quality"
          else
            SUITE="security-extended"
          fi
          echo "value=${SUITE}" >> "$GITHUB_OUTPUT"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: ${{ steps.suite.outputs.value }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            nuget.config

      - name: Restore solution
        run: dotnet restore DCS.slnx

      - name: Build for CodeQL
        env:
          CONFIGURATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_configuration || 'Release' }}
        run: |
          dotnet build DCS.slnx \
            --no-restore \
            -c "${CONFIGURATION}" \
            /p:ContinuousIntegrationBuild=true \
            /p:Deterministic=true \
            /p:UseSharedCompilation=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}-${{ github.event_name }}-${{ steps.suite.outputs.value }}
          output: codeql-sarif
          upload: true
          wait-for-processing: ${{ github.event_name != 'pull_request' }}

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}-${{ github.run_id }}
          path: codeql-sarif/
          retention-days: 14
          if-no-files-found: ignore
