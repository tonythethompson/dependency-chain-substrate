name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: >
          dotnet test --no-build --verbosity normal
          --filter "Category!=CorpusGate"
        env:
          CI: true

  corpus-matrix:
    runs-on: ubuntu-latest
    outputs:
      gates: ${{ steps.load.outputs.gates }}
    steps:
      - uses: actions/checkout@v4

      - name: Load corpus gate matrix
        id: load
        run: echo "gates=$(jq -c '.gates' ci/corpus-gates.json)" >> "$GITHUB_OUTPUT"

  corpus-gate:
    needs: corpus-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.corpus-matrix.outputs.gates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Checkout corpus
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: ${{ matrix.checkoutPath }}
          token: ${{ matrix.privateCheckout && (secrets.CORPUS_CHECKOUT_PAT || secrets.TRACKDUB_PAT) || github.token }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Corpus gate (${{ matrix.id }})
        run: >
          dotnet test ${{ matrix.testProject }} --no-build --verbosity normal
          --filter "Category=CorpusGate&CorpusId=${{ matrix.id }}"
        env:
          CI: true
          GITHUB_ACTIONS: true
          DCS_CORPUS_PATH: ${{ github.workspace }}/${{ matrix.checkoutPath }}
