name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: >
          dotnet test --no-build --verbosity normal
          --filter "FullyQualifiedName!~TrackdubSemanticGateTests&FullyQualifiedName!~PetClinic_parse_stats_when_available"
        env:
          CI: true

  trackdub-semantic:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Clone Trackdub pin
        uses: actions/checkout@v4
        with:
          repository: tonythethompson/Trackdub
          ref: 3c4e374d23fe3941ed7ca376775937941973b313
          path: dcs-trackdub-pin
          token: ${{ secrets.TRACKDUB_PAT }}
          fetch-depth: 1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Trackdub semantic gate
        run: dotnet test tests/DCS.Parser.CSharp.Tests/DCS.Parser.CSharp.Tests.csproj --no-build --filter "FullyQualifiedName~TrackdubSemanticGateTests" --verbosity normal
        env:
          CI: true
          GITHUB_ACTIONS: true
          TRACKDUB_PATH: ${{ github.workspace }}/dcs-trackdub-pin

  petclinic-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: PetClinic gate
        run: dotnet test tests/DCS.Parser.Java.Tests/DCS.Parser.Java.Tests.csproj --no-build --filter "FullyQualifiedName~SpringPetClinicIntegrationTests" --verbosity normal
        env:
          CI: true
          GITHUB_ACTIONS: true
